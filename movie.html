<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Film</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>


    <!-- Titre & Menus & Logo -->
    <header>
        <img src="assets/img/logo.png" alt="Logo Cinéma du Village" class="logo">
        <h1>Cinéma du Village</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="search.html">Recherches</a>
        </nav>
    </header>

    <!-- Résumé du Film -->

    <main class="movie-details">
        

<!-- Affiche du Film -->
        <img id="movie-poster" src="" alt="Poster du film" class="poster">



<!-- Titre du film -->
        <h2 id="movie-title"></h2>

        <p id="movie-plot" class="intro-text"></p>
    
    
 <!-- INFORMATIONS -->

        <p><strong>Genre :</strong> <span id="movie-genre"></span></p>
        <p><strong>Acteurs :</strong> <span id="movie-actors"></span></p>

        <p><strong>Notes :</strong> <span id="movie-ratings"></span></p>
        <p><strong>Sortie DVD :</strong> <span id="movie-dvd"></span></p>
    </main>
    
    
    
    
    <!-- Droits Réservée-->
    <footer>
        <p>&copy; Cinéma du Village - Projet étudiant</p>
    </footer>
    <script src="js/api.js"></script>
    <script src="js/movie.js"></script>


</body>
</html>
